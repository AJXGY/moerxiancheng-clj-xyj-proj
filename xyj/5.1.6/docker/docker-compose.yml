version: '3.8'

services:
  mtt-training-single:
    build:
      context: .
      dockerfile: docker/Dockerfile
    image: mtt-training:5.1.6
    container_name: mtt-training-single
    stdin_open: true
    tty: true
    environment:
      - CUDA_VISIBLE_DEVICES=0
      - PYTHONUNBUFFERED=1
    volumes:
      - ./:/workspace
      - ./model:/workspace/model:ro
      - ./artifacts:/workspace/artifacts
    working_dir: /workspace
    command: >
      bash -c "
        echo 'Single-card training container started' &&
        python3 preflight_check.py --output artifacts/preflight.json &&
        bash run_516_suite.sh --dry-run
      "

  mtt-training-dual:
    build:
      context: .
      dockerfile: docker/Dockerfile
    image: mtt-training:5.1.6
    container_name: mtt-training-dual
    stdin_open: true
    tty: true
    environment:
      - CUDA_VISIBLE_DEVICES=0,1
      - PYTHONUNBUFFERED=1
    volumes:
      - ./:/workspace
      - ./model:/workspace/model:ro
      - ./artifacts:/workspace/artifacts
    working_dir: /workspace
    command: >
      bash -c "
        echo 'Dual-card training container started' &&
        bash run_516_suite.sh --dry-run --dual-device-ids 0,1
      "

networks:
  default:
    name: mtt-training-network
