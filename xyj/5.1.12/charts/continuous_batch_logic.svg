<svg xmlns="http://www.w3.org/2000/svg" width="900" height="360" viewBox="0 0 900 360">
<rect width="100%" height="100%" fill="#f8fafc"/>
<text x="32" y="40" font-size="24" font-family="Arial, Helvetica, sans-serif" font-weight="700" fill="#0f172a">连续 Batch / Microbatch 执行逻辑</text>
<rect x="70" y="110" width="130" height="60" rx="14" fill="#fde68a" stroke="#f59e0b"/>
<text x="90" y="145" font-size="18" font-family="Arial, Helvetica, sans-serif" fill="#92400e" font-weight="700">SLOT0</text>
<line x1="200" y1="140" x2="250" y2="140" stroke="#6b7280" stroke-width="4"/>
<polygon points="250,140 236,133 236,147" fill="#6b7280"/>
<rect x="250" y="110" width="130" height="60" rx="14" fill="#fde68a" stroke="#f59e0b"/>
<text x="270" y="145" font-size="18" font-family="Arial, Helvetica, sans-serif" fill="#92400e" font-weight="700">SLOT1</text>
<line x1="380" y1="140" x2="430" y2="140" stroke="#6b7280" stroke-width="4"/>
<polygon points="430,140 416,133 416,147" fill="#6b7280"/>
<rect x="430" y="110" width="130" height="60" rx="14" fill="#fde68a" stroke="#f59e0b"/>
<text x="450" y="145" font-size="18" font-family="Arial, Helvetica, sans-serif" fill="#92400e" font-weight="700">SLOT2</text>
<line x1="560" y1="140" x2="610" y2="140" stroke="#6b7280" stroke-width="4"/>
<polygon points="610,140 596,133 596,147" fill="#6b7280"/>
<rect x="610" y="110" width="130" height="60" rx="14" fill="#fde68a" stroke="#f59e0b"/>
<text x="630" y="145" font-size="18" font-family="Arial, Helvetica, sans-serif" fill="#92400e" font-weight="700">SLOT3</text>
<text x="70" y="225" font-size="15" font-family="Arial, Helvetica, sans-serif" fill="#334155">slot0/1 prefill on stage0, then dispatch to stage1 decode</text>
<text x="70" y="253" font-size="15" font-family="Arial, Helvetica, sans-serif" fill="#334155">stage1 decode overlaps next prefill wave</text>
<text x="70" y="281" font-size="15" font-family="Arial, Helvetica, sans-serif" fill="#334155">finished requests leave slots; new requests are admitted continuously</text>
<text x="70" y="309" font-size="15" font-family="Arial, Helvetica, sans-serif" fill="#334155">kv-cache and sampling loop until eos or max_new_tokens</text>
</svg>
